<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlow AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,500&family=Work+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #12142a;
    --bg-panel: #1a1e3d;
    --paper: #f6f0e1;
    --paper-line: #e3d9c2;
    --ink: #241f16;
    --amber: #e8a33d;
    --amber-soft: rgba(232,163,61,0.16);
    --mint: #7fd9a6;
    --text: #f3efe3;
    --text-muted: #a9a6c9;
    --danger: #e07a5f;
    --serif: 'Fraunces', Georgia, serif;
    --sans: 'Work Sans', -apple-system, sans-serif;
    --mono: 'IBM Plex Mono', 'Courier New', monospace;
    --radius: 6px;
  }

  * { box-sizing: border-box; }

  body{
    margin: 0;
    padding-top: 60px;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  a { color: var(--amber); }

  :focus-visible{
    outline: 2px solid var(--amber);
    outline-offset: 3px;
  }

  .wrap{
    max-width: 1000px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* ---------- Hero ---------- */

  header.hero{
    position: relative;
    padding: 72px 24px 56px;
    text-align: center;
    overflow: hidden;
  }

  header.hero::before{
    content: "";
    position: absolute;
    top: -120px;
    left: 50%;
    transform: translateX(-50%);
    width: 640px;
    height: 460px;
    background: radial-gradient(closest-side, var(--amber-soft), transparent 70%);
    pointer-events: none;
  }

  h1.title{
    position: relative;
    font-family: var(--serif);
    font-weight: 600;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    letter-spacing: -0.01em;
    margin: 0 0 18px;
  }

  h1.title em{
    font-style: italic;
    font-weight: 500;
    color: var(--amber);
  }

  .subtitle{
    position: relative;
    max-width: 480px;
    margin: 0 auto;
    color: var(--text-muted);
    font-size: 1.05rem;
  }

  /* ---------- Input card (legal pad) ---------- */

  .pad-card{
    background: var(--paper);
    border-radius: var(--radius);
    box-shadow: 0 20px 50px -20px rgba(0,0,0,0.55);
    padding: 28px 28px 24px 56px;
    position: relative;
  }

  .pad-card::before{
    content: "";
    position: absolute;
    left: 34px;
    top: 0;
    bottom: 0;
    width: 1px;
    background: var(--danger);
    opacity: 0.35;
  }

  .pad-label{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.55;
    margin-bottom: 10px;
    display: block;
  }

  /* ---------- Upload row ---------- */

  .upload-row{
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }

  .btn-upload{
    appearance: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(36,31,22,0.06);
    border: 1px dashed rgba(36,31,22,0.35);
    color: var(--ink);
    font-family: var(--sans);
    font-weight: 500;
    font-size: 13px;
    padding: 9px 14px;
    border-radius: 8px;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .btn-upload:hover{
    border-color: var(--danger);
    background: rgba(224,122,95,0.08);
  }
  .btn-upload svg{ width: 15px; height: 15px; flex-shrink: 0; }

  .upload-status{
    font-family: var(--mono);
    font-size: 12px;
    color: #8a8060;
  }
  .upload-status.error{
    color: #b3452f;
  }

  textarea#notes{
    width: 100%;
    min-height: 200px;
    resize: vertical;
    border: none;
    background: repeating-linear-gradient(
      var(--paper),
      var(--paper) 31px,
      var(--paper-line) 32px
    );
    background-attachment: local;
    line-height: 32px;
    font-family: var(--sans);
    font-size: 15.5px;
    color: var(--ink);
    padding: 0;
    outline: none;
  }

  textarea#notes::placeholder{
    color: #8a8060;
  }

  .pad-footer{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 18px;
    gap: 16px;
    flex-wrap: wrap;
  }

  .char-count{
    font-family: var(--mono);
    font-size: 12px;
    color: #8a8060;
  }

  button#generate{
    appearance: none;
    border: none;
    cursor: pointer;
    background: var(--amber);
    color: #1c1305;
    font-family: var(--sans);
    font-weight: 600;
    font-size: 15px;
    padding: 13px 26px;
    border-radius: 999px;
    box-shadow: 0 8px 24px -8px rgba(232,163,61,0.7);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }

  button#generate:hover:not(:disabled){
    transform: translateY(-1px);
    box-shadow: 0 10px 28px -8px rgba(232,163,61,0.85);
  }

  button#generate:disabled{
    opacity: 0.75;
    cursor: progress;
  }

  .dots span{
    display: inline-block;
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: #1c1305;
    margin-left: 2px;
    animation: pulse 1.1s infinite ease-in-out;
  }
  .dots span:nth-child(2){ animation-delay: 0.15s; }
  .dots span:nth-child(3){ animation-delay: 0.3s; }

  @keyframes pulse{
    0%, 80%, 100% { opacity: 0.25; transform: scale(0.85); }
    40% { opacity: 1; transform: scale(1); }
  }

  /* ---------- Error ---------- */

  .error-note{
    display: none;
    margin-top: 20px;
    background: #2a1a1a;
    border: 1px solid rgba(224,122,95,0.4);
    color: #f3d4c8;
    padding: 14px 18px;
    border-radius: var(--radius);
    font-size: 14px;
  }
  .error-note.show{ display: block; }

  /* ---------- Results ---------- */

  section#results{
    margin-top: 56px;
    display: none;
  }
  section#results.show{
    display: block;
  }

  .results-heading{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 20px;
  }

  .card-grid{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 22px;
  }

  @media (max-width: 720px){
    .card-grid{ grid-template-columns: 1fr; }
    .pad-card{ padding: 24px 20px 20px 44px; }
    .pad-card::before{ left: 24px; }
  }

  .card{
    background: var(--paper);
    color: var(--ink);
    border-radius: var(--radius);
    padding: 24px 24px 22px;
    position: relative;
    box-shadow: 0 16px 34px -18px rgba(0,0,0,0.6);
  }

  .card:nth-child(1){ transform: rotate(-0.6deg); }
  .card:nth-child(2){ transform: rotate(0.5deg); }
  .card:nth-child(3){ transform: rotate(0.4deg); }
  .card:nth-child(4){ transform: rotate(-0.5deg); }

  .card::after{
    content: attr(data-index);
    position: absolute;
    top: 12px;
    right: 16px;
    font-family: var(--mono);
    font-size: 34px;
    font-weight: 500;
    color: var(--ink);
    opacity: 0.06;
    line-height: 1;
  }

  .card .pin{
    width: 9px;
    height: 9px;
    border-radius: 50%;
    background: var(--amber);
    box-shadow: 0 0 0 3px var(--amber-soft);
    margin-bottom: 12px;
  }

  .card h3{
    font-family: var(--serif);
    font-size: 1.25rem;
    font-weight: 600;
    margin: 0 0 12px;
  }

  .card .body{
    font-size: 14.5px;
    line-height: 1.6;
    white-space: pre-line;
  }

  .card .body ul{
    margin: 0;
    padding-left: 18px;
  }

  .card .body li{
    margin-bottom: 6px;
  }

  .term-chip{
    display: inline-block;
    background: rgba(127,217,166,0.18);
    color: #1f5c40;
    border: 1px solid rgba(127,217,166,0.5);
    padding: 4px 10px;
    border-radius: 999px;
    font-family: var(--mono);
    font-size: 12.5px;
    margin: 0 6px 8px 0;
  }

  /* ---------- Footer ---------- */

  footer{
    margin-top: 72px;
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
  }

  footer .underline{
    display: inline-block;
    border-bottom: 2px solid var(--amber);
    padding-bottom: 2px;
  }

  /* ---------- Top nav ---------- */

  .topnav{
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    display: flex;
    align-items: center;
    padding: 0 20px;
    background: rgba(18,20,42,0.55);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid rgba(243,239,227,0.08);
    z-index: 30;
  }

  .hamburger-btn{
    appearance: none;
    cursor: pointer;
    background: transparent;
    border: none;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 5px;
    padding: 10px;
    margin-left: -10px;
  }
  .hamburger-btn span{
    display: block;
    width: 20px;
    height: 2px;
    border-radius: 2px;
    background: var(--text);
  }

  /* ---------- Save / export action bar ---------- */

  .action-bar{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    margin-bottom: 22px;
  }

  .save-group{
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  #courseInput{
    background: var(--bg-panel);
    border: 1px solid rgba(243,239,227,0.2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 13.5px;
    padding: 10px 14px;
    border-radius: 8px;
    min-width: 220px;
  }
  #courseInput::placeholder{ color: var(--text-muted); }

  .btn-secondary{
    appearance: none;
    cursor: pointer;
    background: transparent;
    border: 1px solid var(--amber);
    color: var(--amber);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13.5px;
    padding: 10px 18px;
    border-radius: 999px;
    transition: background 0.15s ease, color 0.15s ease;
    white-space: nowrap;
  }
  .btn-secondary:hover{
    background: var(--amber);
    color: #1c1305;
  }

  /* ---------- Drawer ---------- */

  .drawer-overlay{
    position: fixed;
    inset: 0;
    background: rgba(8,9,20,0.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 40;
  }
  .drawer-overlay.show{
    opacity: 1;
    pointer-events: auto;
  }

  .drawer{
    position: fixed;
    top: 0;
    left: 0;
    bottom: 0;
    width: min(360px, 88vw);
    background: var(--bg-panel);
    transform: translateX(-100%);
    transition: transform 0.25s ease;
    z-index: 50;
    display: flex;
    flex-direction: column;
    box-shadow: 20px 0 50px -20px rgba(0,0,0,0.6);
  }
  .drawer.show{
    transform: translateX(0);
  }

  .drawer-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 22px 16px;
    border-bottom: 1px solid rgba(243,239,227,0.12);
  }
  .drawer-header h2{
    font-family: var(--serif);
    font-size: 1.2rem;
    font-weight: 600;
    margin: 0;
  }
  .drawer-close{
    appearance: none;
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 22px;
    line-height: 1;
    cursor: pointer;
    padding: 4px;
  }
  .drawer-close:hover{ color: var(--amber); }

  .drawer-body{
    padding: 14px 14px 10px;
    overflow-y: auto;
    flex: 1;
  }

  .menu-item{
    appearance: none;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    text-align: left;
    background: transparent;
    border: none;
    cursor: pointer;
    color: var(--text);
    font-family: var(--sans);
    font-weight: 500;
    font-size: 14.5px;
    padding: 12px 10px;
    border-radius: 8px;
  }
  .menu-item:hover{ background: rgba(232,163,61,0.08); }
  .menu-item .chevron{
    width: 15px;
    height: 15px;
    transition: transform 0.2s ease;
  }
  .menu-item .chevron.open{ transform: rotate(180deg); }

  .courses-panel{
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.25s ease;
    padding: 0 10px;
  }
  .courses-panel.show{
    max-height: 2000px;
    padding: 6px 10px 10px;
  }

  .drawer-footer{
    margin-top: auto;
    padding: 14px 14px 20px;
    border-top: 1px solid rgba(243,239,227,0.12);
  }
  .drawer-footer .menu-item svg{ width: 16px; height: 16px; }

  .drawer-empty{
    color: var(--text-muted);
    font-size: 13.5px;
    line-height: 1.6;
    padding: 4px 10px 10px;
  }

  .course-group{
    margin-bottom: 22px;
  }
  .course-name{
    font-family: var(--mono);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--amber);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .course-count{
    background: var(--amber-soft);
    color: var(--amber);
    border-radius: 999px;
    padding: 1px 8px;
    font-size: 11px;
  }

  .course-entries{
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .course-entry{
    display: flex;
    align-items: stretch;
    background: rgba(243,239,227,0.06);
    border-radius: 8px;
    overflow: hidden;
  }

  .entry-open{
    flex: 1;
    text-align: left;
    background: transparent;
    border: none;
    color: var(--text);
    padding: 10px 12px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .entry-open:hover{ background: rgba(232,163,61,0.1); }
  .entry-title{
    font-size: 13.5px;
    font-weight: 500;
  }
  .entry-date{
    font-family: var(--mono);
    font-size: 11px;
    color: var(--text-muted);
  }

  .entry-delete{
    appearance: none;
    background: transparent;
    border: none;
    border-left: 1px solid rgba(243,239,227,0.1);
    color: var(--text-muted);
    width: 34px;
    font-size: 16px;
    cursor: pointer;
  }
  .entry-delete:hover{
    color: var(--danger);
    background: rgba(224,122,95,0.08);
  }

  /* ---------- Account modal ---------- */

  .modal-overlay{
    position: fixed;
    inset: 0;
    background: rgba(8,9,20,0.6);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease;
    z-index: 70;
  }
  .modal-overlay.show{
    opacity: 1;
    pointer-events: auto;
  }

  .modal{
    position: fixed;
    top: 50%;
    left: 50%;
    width: min(420px, 90vw);
    background: var(--bg-panel);
    border-radius: 12px;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -46%);
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 80;
    box-shadow: 0 30px 70px -20px rgba(0,0,0,0.7);
  }
  .modal.show{
    opacity: 1;
    pointer-events: auto;
    transform: translate(-50%, -50%);
  }

  .modal-header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 22px 14px;
    border-bottom: 1px solid rgba(243,239,227,0.12);
  }
  .modal-header h2{
    font-family: var(--serif);
    font-size: 1.15rem;
    font-weight: 600;
    margin: 0;
  }

  .modal-body{
    padding: 20px 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .field-label{
    font-family: var(--mono);
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: -4px;
  }

  .modal-body input[type="text"],
  .modal-body input[type="email"]{
    background: rgba(243,239,227,0.06);
    border: 1px solid rgba(243,239,227,0.2);
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    padding: 10px 12px;
    border-radius: 8px;
  }

  .modal-divider{
    height: 1px;
    background: rgba(243,239,227,0.12);
    margin: 6px 0;
  }

  .btn-danger{
    appearance: none;
    cursor: pointer;
    background: transparent;
    border: 1px solid var(--danger);
    color: var(--danger);
    font-family: var(--sans);
    font-weight: 600;
    font-size: 13.5px;
    padding: 10px 16px;
    border-radius: 999px;
    transition: background 0.15s ease, color 0.15s ease;
  }
  .btn-danger:hover{
    background: var(--danger);
    color: #2a1a1a;
  }

  /* ---------- Toast ---------- */

  .toast{
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    background: var(--amber);
    color: #1c1305;
    font-weight: 600;
    font-size: 13.5px;
    padding: 12px 20px;
    border-radius: 999px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
    z-index: 60;
    box-shadow: 0 12px 30px -10px rgba(0,0,0,0.5);
  }
  .toast.show{
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation: none !important; transition: none !important; }
  }
</style>
</head>
<body>

<nav class="topnav">
  <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleDrawer()" aria-label="Open menu">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="wrap">
  <header class="hero">
    <h1 class="title">Get in your <em>flow state</em><br>with StudyFlow</h1>
    <p class="subtitle">Paste your lecture notes and StudyFlow AI turns them into a summary, key terms, a practice quiz, and a study plan — in seconds.</p>
  </header>

  <main>
    <div class="pad-card">
      <label class="pad-label" for="notes">Course notes</label>

      <div class="upload-row">
        <button type="button" class="btn-upload" onclick="document.getElementById('fileInput').click()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0-12 4 4m-4-4-4 4M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
          Upload PDF, PPTX, DOCX, or image
        </button>
        <input type="file" id="fileInput" accept=".pdf,.pptx,.docx,.png,.jpg,.jpeg" hidden onchange="handleFileUpload(event)">
        <span class="upload-status" id="uploadStatus"></span>
      </div>

      <textarea id="notes" placeholder="Paste your notes here..."></textarea>
      <div class="pad-footer">
        <span class="char-count" id="charCount">0 characters</span>
        <button id="generate" onclick="generateStudyMaterial()">
          <span id="btnLabel">Generate study material</span>
        </button>
      </div>
    </div>

    <div class="error-note" id="errorNote"></div>

    <section id="results">
      <div class="results-heading">Your study material</div>

      <div class="action-bar">
        <div class="save-group">
          <input list="courseList" id="courseInput" placeholder="Course name (e.g. Biology 101)">
          <datalist id="courseList"></datalist>
          <button class="btn-secondary" onclick="saveToCourse()">Save to course</button>
        </div>
        <button class="btn-secondary" onclick="downloadPDF()">Download PDF</button>
      </div>

      <div class="card-grid" id="cardGrid"></div>
    </section>
  </main>

  <footer>
    <span class="underline">StudyFlow AI</span> — built with QwenCloud, deployed on Alibaba Cloud
  </footer>
</div>

<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
<aside class="drawer" id="drawer" aria-label="Menu">
  <div class="drawer-header">
    <h2>Menu</h2>
    <button class="drawer-close" onclick="closeDrawer()" aria-label="Close">&times;</button>
  </div>

  <div class="drawer-body">
    <button class="menu-item" id="coursesToggle" onclick="toggleCoursesPanel()">
      <span>My Courses</span>
      <svg class="chevron" id="coursesChevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
    </button>
    <div class="courses-panel" id="coursesPanel"></div>
  </div>

  <div class="drawer-footer">
    <button class="menu-item" onclick="openAccountPanel()">
      <span style="display:flex; align-items:center; gap:10px;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-6 8-6s8 2 8 6"/></svg>
        Account &amp; Settings
      </span>
    </button>
  </div>
</aside>

<div class="modal-overlay" id="accountOverlay" onclick="closeAccountModal()"></div>
<div class="modal" id="accountModal" role="dialog" aria-label="Account and settings">
  <div class="modal-header">
    <h2>Account &amp; Settings</h2>
    <button class="drawer-close" onclick="closeAccountModal()" aria-label="Close">&times;</button>
  </div>
  <div class="modal-body">
    <label class="field-label" for="displayName">Display name</label>
    <input type="text" id="displayName" placeholder="Your name">

    <label class="field-label" for="displayEmail">Email</label>
    <input type="email" id="displayEmail" placeholder="you@school.edu">

    <button class="btn-secondary" onclick="saveAccountSettings()">Save changes</button>

    <div class="modal-divider"></div>

    <span class="field-label">Data</span>
    <button class="btn-danger" onclick="clearAllData()">Clear all saved notes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
  // Update this once the backend is deployed on Alibaba Cloud ECS,
  // e.g. "https://your-ecs-ip-or-domain/generate"
  const API_URL = "http://127.0.0.1:5001/generate";
  const EXTRACT_URL = "http://127.0.0.1:5001/extract";

  const notesEl = document.getElementById("notes");
  const charCount = document.getElementById("charCount");
  const btn = document.getElementById("generate");
  const btnLabel = document.getElementById("btnLabel");
  const errorNote = document.getElementById("errorNote");
  const resultsSection = document.getElementById("results");
  const cardGrid = document.getElementById("cardGrid");

  // Holds the most recently generated (or reloaded) notes + result,
  // used by "Save to course" and "Download PDF".
  let currentNotes = "";
  let currentResultText = "";

  notesEl.addEventListener("input", () => {
    charCount.textContent = `${notesEl.value.length} characters`;
  });

  const SECTIONS = [
    { key: "summary", label: "Summary", match: /summary/i },
    { key: "terms", label: "Key Terms", match: /key terms/i },
    { key: "quiz", label: "Practice Quiz", match: /quiz/i },
    { key: "plan", label: "Study Plan", match: /study plan/i },
  ];

  function parseSections(text) {
    // Find where each labeled section starts, based on headers like
    // "1. Summary", "Key Terms:", "Practice Quiz", etc.
    const lines = text.split("\n");
    const markers = [];

    lines.forEach((line, i) => {
      const cleaned = line.replace(/^[#*\s\d\.\)\-]+/, "").trim();
      for (const section of SECTIONS) {
        if (section.match.test(cleaned) && cleaned.length < 60) {
          markers.push({ index: i, key: section.key, label: section.label });
          break;
        }
      }
    });

    if (markers.length < 2) return null; // not enough structure found

    const sections = {};
    markers.forEach((m, i) => {
      const end = i + 1 < markers.length ? markers[i + 1].index : lines.length;
      const content = lines.slice(m.index + 1, end).join("\n").trim();
      sections[m.key] = content;
    });
    return sections;
  }

  function renderBody(key, content) {
    if (key === "terms") {
      const terms = content
        .split(/\n|,/)
        .map(t => t.replace(/^[-*\d\.\)\s]+/, "").trim())
        .filter(Boolean);
      if (terms.length) {
        return terms.map(t => `<span class="term-chip">${escapeHtml(t)}</span>`).join("");
      }
    }
    if (key === "quiz" || key === "plan") {
      const items = content.split("\n").map(l => l.trim()).filter(Boolean);
      if (items.length > 1) {
        return `<ul>${items.map(i => `<li>${escapeHtml(i.replace(/^[-*\d\.\)\s]+/, ""))}</li>`).join("")}</ul>`;
      }
    }
    return escapeHtml(content);
  }

  function escapeHtml(str) {
    const div = document.createElement("div");
    div.textContent = str;
    return div.innerHTML;
  }

  function renderResults(rawText) {
    cardGrid.innerHTML = "";
    const parsed = parseSections(rawText);

    if (!parsed) {
      // Fallback: show the raw response in a single card
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.index = "01";
      card.innerHTML = `
        <div class="pin"></div>
        <h3>Study Material</h3>
        <div class="body">${escapeHtml(rawText)}</div>
      `;
      cardGrid.appendChild(card);
      return;
    }

    SECTIONS.forEach((section, i) => {
      const content = parsed[section.key];
      if (!content) return;
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.index = String(i + 1).padStart(2, "0");
      card.innerHTML = `
        <div class="pin"></div>
        <h3>${section.label}</h3>
        <div class="body">${renderBody(section.key, content)}</div>
      `;
      cardGrid.appendChild(card);
    });
  }

  /* ---------- Courses (saved locally in this browser) ---------- */

  const STORAGE_KEY = "studyflow_courses";

  function loadCourses() {
    try {
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {};
    } catch {
      return {};
    }
  }

  function saveCourses(courses) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(courses));
  }

  function populateCourseDatalist() {
    const names = Object.keys(loadCourses());
    document.getElementById("courseList").innerHTML =
      names.map(n => `<option value="${escapeHtml(n)}"></option>`).join("");
  }

  function saveToCourse() {
    const courseInput = document.getElementById("courseInput");
    const courseName = courseInput.value.trim();

    if (!courseName) {
      showToast("Enter a course name first.");
      return;
    }
    if (!currentResultText) {
      showToast("Generate study material first.");
      return;
    }

    const courses = loadCourses();
    if (!courses[courseName]) courses[courseName] = [];

    const firstLine = currentNotes.split("\n").find(l => l.trim().length) || "Untitled notes";
    const title = firstLine.trim().slice(0, 60);

    courses[courseName].unshift({
      id: Date.now().toString(),
      title,
      notes: currentNotes,
      result: currentResultText,
      savedAt: new Date().toISOString(),
    });

    saveCourses(courses);
    populateCourseDatalist();
    showToast(`Saved to ${courseName}`);
  }

  function loadEntry(courseName, id) {
    const courses = loadCourses();
    const entry = (courses[courseName] || []).find(e => e.id === id);
    if (!entry) return;

    notesEl.value = entry.notes;
    charCount.textContent = `${entry.notes.length} characters`;
    currentNotes = entry.notes;
    currentResultText = entry.result;

    renderResults(entry.result);
    resultsSection.classList.add("show");
    document.getElementById("courseInput").value = courseName;

    closeDrawer();
    resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
  }

  function deleteEntry(courseName, id) {
    const courses = loadCourses();
    if (!courses[courseName]) return;

    courses[courseName] = courses[courseName].filter(e => e.id !== id);
    if (courses[courseName].length === 0) delete courses[courseName];

    saveCourses(courses);
    renderDrawer();
    populateCourseDatalist();
  }

  function renderDrawer() {
    const courses = loadCourses();
    const names = Object.keys(courses);
    const panel = document.getElementById("coursesPanel");

    if (names.length === 0) {
      panel.innerHTML = `<p class="drawer-empty">No saved notes yet. Generate study material, then save it to a course folder.</p>`;
      return;
    }

    panel.innerHTML = names.map(name => `
      <div class="course-group">
        <div class="course-name">${escapeHtml(name)} <span class="course-count">${courses[name].length}</span></div>
        <div class="course-entries">
          ${courses[name].map(e => `
            <div class="course-entry">
              <button class="entry-open" data-course="${escapeHtml(name)}" data-id="${e.id}">
                <span class="entry-title">${escapeHtml(e.title)}</span>
                <span class="entry-date">${new Date(e.savedAt).toLocaleDateString()}</span>
              </button>
              <button class="entry-delete" data-course="${escapeHtml(name)}" data-id="${e.id}" aria-label="Delete entry">&times;</button>
            </div>
          `).join("")}
        </div>
      </div>
    `).join("");
  }

  document.getElementById("coursesPanel").addEventListener("click", (e) => {
    const openBtn = e.target.closest(".entry-open");
    if (openBtn) {
      loadEntry(openBtn.dataset.course, openBtn.dataset.id);
      return;
    }
    const delBtn = e.target.closest(".entry-delete");
    if (delBtn) {
      deleteEntry(delBtn.dataset.course, delBtn.dataset.id);
    }
  });

  function toggleCoursesPanel() {
    const panel = document.getElementById("coursesPanel");
    const chevron = document.getElementById("coursesChevron");
    const isOpen = panel.classList.contains("show");

    if (isOpen) {
      panel.classList.remove("show");
      chevron.classList.remove("open");
    } else {
      renderDrawer();
      panel.classList.add("show");
      chevron.classList.add("open");
    }
  }

  function openDrawer() {
    document.getElementById("drawer").classList.add("show");
    document.getElementById("drawerOverlay").classList.add("show");
  }

  function closeDrawer() {
    document.getElementById("drawer").classList.remove("show");
    document.getElementById("drawerOverlay").classList.remove("show");
  }

  function toggleDrawer() {
    document.getElementById("drawer").classList.contains("show") ? closeDrawer() : openDrawer();
  }

  let toastTimer;
  function showToast(message) {
    const toast = document.getElementById("toast");
    toast.textContent = message;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove("show"), 2400);
  }

  /* ---------- Account & settings ---------- */

  const ACCOUNT_KEY = "studyflow_account";

  function loadAccount() {
    try {
      return JSON.parse(localStorage.getItem(ACCOUNT_KEY)) || {};
    } catch {
      return {};
    }
  }

  function openAccountPanel() {
    const account = loadAccount();
    document.getElementById("displayName").value = account.name || "";
    document.getElementById("displayEmail").value = account.email || "";
    document.getElementById("accountOverlay").classList.add("show");
    document.getElementById("accountModal").classList.add("show");
  }

  function closeAccountModal() {
    document.getElementById("accountOverlay").classList.remove("show");
    document.getElementById("accountModal").classList.remove("show");
  }

  function saveAccountSettings() {
    const name = document.getElementById("displayName").value.trim();
    const email = document.getElementById("displayEmail").value.trim();
    localStorage.setItem(ACCOUNT_KEY, JSON.stringify({ name, email }));
    showToast("Settings saved");
    closeAccountModal();
  }

  function clearAllData() {
    const confirmed = confirm("This deletes all saved courses and notes from this browser. This can't be undone. Continue?");
    if (!confirmed) return;

    localStorage.removeItem(STORAGE_KEY);
    renderDrawer();
    populateCourseDatalist();
    showToast("All saved notes cleared");
  }

  populateCourseDatalist();

  /* ---------- PDF export ---------- */

  function downloadPDF() {
    if (!currentResultText) {
      showToast("Generate study material first.");
      return;
    }

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ unit: "pt", format: "letter" });
    const margin = 56;
    const maxWidth = 500;
    let y = margin;

    doc.setFont("helvetica", "bold");
    doc.setFontSize(18);
    doc.text("StudyFlow AI — Study Material", margin, y);
    y += 22;

    doc.setFont("helvetica", "normal");
    doc.setFontSize(10);
    doc.setTextColor(120);
    doc.text(new Date().toLocaleDateString(), margin, y);
    doc.setTextColor(20);
    y += 26;

    const parsed = parseSections(currentResultText);
    const sectionsToPrint = parsed
      ? SECTIONS.filter(s => parsed[s.key]).map(s => ({ label: s.label, content: parsed[s.key] }))
      : [{ label: "Study Material", content: currentResultText }];

    sectionsToPrint.forEach(section => {
      if (y > 700) { doc.addPage(); y = margin; }

      doc.setFont("helvetica", "bold");
      doc.setFontSize(13);
      doc.text(section.label, margin, y);
      y += 18;

      doc.setFont("helvetica", "normal");
      doc.setFontSize(11);
      const lines = doc.splitTextToSize(section.content, maxWidth);
      lines.forEach(line => {
        if (y > 730) { doc.addPage(); y = margin; }
        doc.text(line, margin, y);
        y += 15;
      });
      y += 16;
    });

    doc.save(`StudyFlow-${new Date().toISOString().slice(0, 10)}.pdf`);
  }

  /* ---------- File upload (PDF / PPTX) ---------- */

  async function handleFileUpload(event) {
    const file = event.target.files[0];
    if (!file) return;

    const uploadStatus = document.getElementById("uploadStatus");
    const ext = file.name.split(".").pop().toLowerCase();

    uploadStatus.classList.remove("error");

    if (!["pdf", "pptx", "docx", "png", "jpg", "jpeg"].includes(ext)) {
      uploadStatus.textContent = "Only PDF, PPTX, DOCX, or image files are supported.";
      uploadStatus.classList.add("error");
      event.target.value = "";
      return;
    }

    uploadStatus.textContent = `Reading ${file.name}…`;

    const formData = new FormData();
    formData.append("file", file);

    try {
      const response = await fetch(EXTRACT_URL, {
        method: "POST",
        body: formData,
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Couldn't read that file.");
      }

      const existing = notesEl.value.trim();
      notesEl.value = existing ? `${existing}\n\n${data.text}` : data.text;
      charCount.textContent = `${notesEl.value.length} characters`;
      uploadStatus.textContent = `Added text from ${file.name}`;
    } catch (err) {
      uploadStatus.textContent = err.message.includes("fetch")
        ? "Couldn't reach the backend. Make sure the server is running."
        : err.message;
      uploadStatus.classList.add("error");
    } finally {
      event.target.value = "";
    }
  }

  async function generateStudyMaterial() {
    const notes = notesEl.value.trim();
    errorNote.classList.remove("show");

    if (!notes) {
      errorNote.textContent = "Add some notes before generating.";
      errorNote.classList.add("show");
      return;
    }

    btn.disabled = true;
    btnLabel.innerHTML = `Generating<span class="dots"><span></span><span></span><span></span></span>`;

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ course_notes: notes }),
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error || "Something went wrong. Try again.");
      }

      currentNotes = notes;
      currentResultText = data.result;

      renderResults(data.result);
      resultsSection.classList.add("show");
      resultsSection.scrollIntoView({ behavior: "smooth", block: "start" });
    } catch (err) {
      errorNote.textContent = err.message.includes("fetch")
        ? "Couldn't reach the backend. Make sure the server is running."
        : err.message;
      errorNote.classList.add("show");
    } finally {
      btn.disabled = false;
      btnLabel.textContent = "Generate study material";
    }
  }
</script>

</body>
